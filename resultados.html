<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG PROJECT— Resultados</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .logo {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent2); }

  .header-note {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
  }

  /* ── Drop zone ── */
  #app { max-width: 1200px; margin: 0 auto; padding: 48px; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 72px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124, 58, 237, 0.06);
  }

  .drop-icon {
    width: 56px; height: 56px;
    margin: 0 auto 20px;
    background: rgba(124, 58, 237, 0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .drop-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 2; }

  .drop-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .drop-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .btn {
    display: inline-block;
    padding: 10px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-left: 10px;
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

  #file-input { display: none; }

  /* ── Results ── */
  #results { display: none; }

  /* ── Metric cards ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }

  @media (max-width: 900px) {
    .cards-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    position: relative;
    overflow: hidden;
  }

  .metric-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }

  .mc-faith::after  { background: var(--accent); }
  .mc-correct::after{ background: var(--accent3); }
  .mc-rel::after    { background: var(--accent2); }
  .mc-prec::after   { background: var(--warn); }
  .mc-recall::after { background: var(--danger); }

  .mc-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .mc-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .mc-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .mc-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .mc-faith .mc-bar-fill  { background: var(--accent); }
  .mc-correct .mc-bar-fill{ background: var(--accent3); }
  .mc-rel .mc-bar-fill    { background: var(--accent2); }
  .mc-prec .mc-bar-fill   { background: var(--warn); }
  .mc-recall .mc-bar-fill { background: var(--danger); }

  /* ── Charts row ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  @media (max-width: 800px) {
    .charts-row { grid-template-columns: 1fr; }
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-wrap { position: relative; width: 100%; }

  /* ── Insight box ── */
  .insight-box {
    background: rgba(245, 158, 11, 0.07);
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 40px;
    display: none;
    align-items: flex-start;
    gap: 14px;
  }

  .insight-box.visible { display: flex; }

  .insight-dot {
    width: 8px; height: 8px;
    background: var(--warn);
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .insight-title { font-size: 13px; font-weight: 700; color: var(--warn); margin-bottom: 4px; }
  .insight-text  { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* ── Table ── */
  .table-section { margin-bottom: 40px; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td { padding: 14px 16px; vertical-align: middle; }

  .td-question {
    max-width: 300px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .score-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
  }

  .pill-high   { background: rgba(16,185,129,0.12); color: #34d399; }
  .pill-medium { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .pill-low    { background: rgba(239,68,68,0.12);  color: #f87171; }

  .pill-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .pill-high .pill-dot   { background: #34d399; }
  .pill-medium .pill-dot { background: #fbbf24; }
  .pill-low .pill-dot    { background: #f87171; }

  /* ── File info ── */
  .file-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .file-badge {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.25);
    color: #a78bfa;
    padding: 3px 10px;
    border-radius: 4px;
  }

  /* ── Diagnóstico ── */
  .diag-row { background: rgba(245,158,11,0.04) !important; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">RAGPROBE</div>
    <h1>Resultados da <span>Avaliação</span></h1>
  </div>
  <div class="header-note">
    Arraste o arquivo<br>evaluation_scores.csv
  </div>
</div>

<div id="app">

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="drop-title">Solte o arquivo aqui</div>
    <div class="drop-sub">Arraste o <code style="background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;font-size:11px;">evaluation_scores.csv</code> gerado pelo evaluate.py</div>
    <button class="btn" onclick="document.getElementById('file-input').click()">Escolher arquivo</button>
    <button class="btn btn-outline" onclick="loadDemo()">Ver demo</button>
    <input type="file" id="file-input" accept=".csv">
  </div>

  <!-- Results -->
  <div id="results">
    <div class="file-info">
      <span class="file-badge" id="file-name-badge">—</span>
      <span id="file-meta">— perguntas avaliadas</span>
    </div>

    <!-- Metric cards -->
    <div class="cards-grid" id="cards-grid"></div>

    <!-- Insight box -->
    <div class="insight-box" id="insight-box">
      <div class="insight-dot"></div>
      <div>
        <div class="insight-title">Atenção — LLM usando conhecimento próprio</div>
        <div class="insight-text" id="insight-text"></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Scores médios por métrica</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="chart-radar"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Faithfulness × Answer Correctness</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="chart-scatter"></canvas></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="section-header">
        <div class="section-title">Scores por pergunta</div>
        <button class="btn btn-outline" onclick="resetView()" style="font-size:11px;padding:6px 14px;">↩ Carregar outro arquivo</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
const METRIC_COLORS = {
  faithfulness:       { label: 'Faithfulness',       cls: 'mc-faith',   hex: '#7c3aed' },
  answer_correctness: { label: 'Answer Correctness',  cls: 'mc-correct', hex: '#10b981' },
  answer_relevancy:   { label: 'Answer Relevance',    cls: 'mc-rel',     hex: '#06b6d4' },
  context_precision:  { label: 'Context Precision',   cls: 'mc-prec',    hex: '#f59e0b' },
  context_recall:     { label: 'Context Recall',      cls: 'mc-recall',  hex: '#ef4444' },
};

const METRIC_KEYS = Object.keys(METRIC_COLORS);

let radarChart = null;
let scatterChart = null;

// ── CSV parser ──────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
    const row = {};
    headers.forEach((h, i) => {
      const v = (vals[i] || '').replace(/"/g,'').trim();
      row[h] = isNaN(v) || v === '' ? v : parseFloat(v);
    });
    return row;
  });
}

// ── Score pill ──────────────────────────────────────────────
function pill(val) {
  if (isNaN(val) || val === undefined) return '<span style="color:var(--muted);font-size:12px;">—</span>';
  const cls = val >= 0.7 ? 'pill-high' : val >= 0.4 ? 'pill-medium' : 'pill-low';
  return `<span class="score-pill ${cls}"><span class="pill-dot"></span>${val.toFixed(2)}</span>`;
}

// ── Render results ──────────────────────────────────────────
function render(rows, filename) {
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('file-name-badge').textContent = filename || 'evaluation_scores.csv';
  document.getElementById('file-meta').textContent = `${rows.length} pergunta${rows.length !== 1 ? 's' : ''} avaliada${rows.length !== 1 ? 's' : ''}`;

  const avgs = {};
  METRIC_KEYS.forEach(k => {
    const vals = rows.map(r => r[k]).filter(v => v !== undefined && !isNaN(v));
    avgs[k] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  });

  // ── Metric cards ───────────────────────────────────────────
  const cardsGrid = document.getElementById('cards-grid');
  cardsGrid.innerHTML = '';
  METRIC_KEYS.forEach(k => {
    const m = METRIC_COLORS[k];
    const v = avgs[k];
    const pct = v !== null ? Math.round(v * 100) : 0;
    cardsGrid.innerHTML += `
      <div class="metric-card ${m.cls}">
        <div class="mc-label">${m.label}</div>
        <div class="mc-value">${v !== null ? v.toFixed(2) : '—'}</div>
        <div class="mc-bar-bg"><div class="mc-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  });

  // ── Insight: faithfulness baixa + correctness alta ─────────
  const problematic = rows.filter(r =>
    r.faithfulness !== undefined && r.answer_correctness !== undefined &&
    r.faithfulness < 0.5 && r.answer_correctness > 0.6
  );
  const insightBox = document.getElementById('insight-box');
  if (problematic.length > 0) {
    insightBox.classList.add('visible');
    document.getElementById('insight-text').innerHTML =
      `<strong>${problematic.length} pergunta${problematic.length>1?'s':''}</strong> com faithfulness baixa e answer correctness alta — o LLM respondeu corretamente mas <em>sem usar o contexto recuperado</em>. Em aplicações que exigem rastreabilidade, isso é um risco.`;
  }

  // ── Radar chart ─────────────────────────────────────────────
  if (radarChart) radarChart.destroy();
  const radarCtx = document.getElementById('chart-radar').getContext('2d');
  const radarKeys = METRIC_KEYS.filter(k => avgs[k] !== null);
  radarChart = new Chart(radarCtx, {
    type: 'radar',
    data: {
      labels: radarKeys.map(k => METRIC_COLORS[k].label),
      datasets: [{
        data: radarKeys.map(k => avgs[k]),
        backgroundColor: 'rgba(124,58,237,0.15)',
        borderColor: '#7c3aed',
        borderWidth: 2,
        pointBackgroundColor: '#7c3aed',
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 1,
          ticks: { stepSize: 0.25, color: '#64748b', font: { size: 10 }, backdropColor: 'transparent' },
          grid: { color: '#1e1e2e' },
          pointLabels: { color: '#94a3b8', font: { size: 11 } },
          angleLines: { color: '#1e1e2e' },
        }
      }
    }
  });

  // ── Scatter chart ────────────────────────────────────────────
  if (scatterChart) scatterChart.destroy();
  const hasFaith = rows.some(r => r.faithfulness !== undefined);
  const hasCorrect = rows.some(r => r.answer_correctness !== undefined);

  if (hasFaith && hasCorrect) {
    const scatterCtx = document.getElementById('chart-scatter').getContext('2d');
    const normalPoints = rows.filter(r => !(r.faithfulness < 0.5 && r.answer_correctness > 0.6));
    const warnPoints  = rows.filter(r =>   r.faithfulness < 0.5 && r.answer_correctness > 0.6);
    scatterChart = new Chart(scatterCtx, {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: 'Normal',
            data: normalPoints.map(r => ({ x: r.faithfulness, y: r.answer_correctness })),
            backgroundColor: 'rgba(6,182,212,0.7)', pointRadius: 7,
          },
          {
            label: 'LLM usou conhecimento próprio',
            data: warnPoints.map(r => ({ x: r.faithfulness, y: r.answer_correctness })),
            backgroundColor: 'rgba(245,158,11,0.85)', pointRadius: 9,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 10 } },
          tooltip: {
            callbacks: {
              label: ctx => `faith: ${ctx.parsed.x.toFixed(2)} | correct: ${ctx.parsed.y.toFixed(2)}`
            }
          }
        },
        scales: {
          x: { min: -0.05, max: 1.05, title: { display: true, text: 'Faithfulness', color: '#64748b', font:{size:11} }, grid: { color: '#1e1e2e' }, ticks: { color: '#64748b', font:{size:10} } },
          y: { min: -0.05, max: 1.05, title: { display: true, text: 'Answer Correctness', color: '#64748b', font:{size:11} }, grid: { color: '#1e1e2e' }, ticks: { color: '#64748b', font:{size:10} } },
        }
      }
    });
  }

  // ── Table ────────────────────────────────────────────────────
  const availMetrics = METRIC_KEYS.filter(k => rows.some(r => r[k] !== undefined));
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');

  thead.innerHTML = `<tr>
    <th style="width:32px">#</th>
    <th>Pergunta</th>
    ${availMetrics.map(k=>`<th>${METRIC_COLORS[k].label}</th>`).join('')}
  </tr>`;

  tbody.innerHTML = rows.map((r, i) => {
    const isDiag = r.faithfulness < 0.5 && r.answer_correctness > 0.6;
    const q = (r.question || r.Question || '—').substring(0, 80);
    return `<tr class="${isDiag ? 'diag-row' : ''}">
      <td style="color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;">${i+1}</td>
      <td class="td-question" title="${(r.question||'').replace(/"/g,'')}">${q}${(r.question||'').length>80?'…':''}</td>
      ${availMetrics.map(k => `<td>${pill(r[k])}</td>`).join('')}
    </tr>`;
  }).join('');
}

function resetView() {
  document.getElementById('drop-zone').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('insight-box').classList.remove('visible');
}

// ── File handling ────────────────────────────────────────────
function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    render(rows, file.name);
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.csv')) handleFile(f);
});

// ── Demo data ───────────────────────────────────────────────
function loadDemo() {
  const demo = [
    { question: 'Quando foi cunhado o termo inteligência artificial?', faithfulness: 1.0, answer_correctness: 0.91, answer_relevancy: 0.95, context_precision: 0.88, context_recall: 0.85 },
    { question: 'O que foi o Inverno da IA e quando ocorreu?',         faithfulness: 0.9, answer_correctness: 0.83, answer_relevancy: 0.88, context_precision: 0.75, context_recall: 0.80 },
    { question: 'Quantos parâmetros tem o GPT-3?',                     faithfulness: 0.0, answer_correctness: 0.95, answer_relevancy: 0.92, context_precision: 0.30, context_recall: 0.40 },
    { question: 'Como o ChatGPT cresceu rapidamente?',                 faithfulness: 0.8, answer_correctness: 0.78, answer_relevancy: 0.85, context_precision: 0.70, context_recall: 0.72 },
    { question: 'Quem propôs o Teste de Turing?',                      faithfulness: 1.0, answer_correctness: 0.96, answer_relevancy: 0.97, context_precision: 0.93, context_recall: 0.90 },
    { question: 'Quais aplicações atuais existem para IA?',            faithfulness: 0.7, answer_correctness: 0.72, answer_relevancy: 0.80, context_precision: 0.65, context_recall: 0.68 },
    { question: 'O que foi a AlexNet e qual sua importância?',         faithfulness: 0.0, answer_correctness: 0.88, answer_relevancy: 0.90, context_precision: 0.35, context_recall: 0.45 },
    { question: 'Qual o papel do Brasil na regulação de IA?',          faithfulness: 0.85, answer_correctness: 0.75, answer_relevancy: 0.82, context_precision: 0.78, context_recall: 0.74 },
  ];
  render(demo, 'demo_data.csv');
}
</script>
</body>
</html>
